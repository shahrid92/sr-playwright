apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 900
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: k8s-cp-node1
      containers:
      - name: playwright
        image: mcr.microsoft.com/playwright:v1.50.1-noble
        command: ["bash", "-c"]
        args:
          - |
            apt-get update && apt-get install -y git
            git clone https://github.com/shahrid92/sr-playwright.git
            cd sr-playwright
            npm ci
            npx playwright --version
            npx playwright install --with-deps
            npx playwright test --grep {{.Values.args.tags}} --list --project=chromium
            npx playwright test --grep {{.Values.args.tags}}  --workers={{.Values.args.playworker}}  --project={{.Values.args.project}}
            pwd
            ls -la
            cd test-results
            ls -la
        resources:
          requests:
            cpu: "2"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
